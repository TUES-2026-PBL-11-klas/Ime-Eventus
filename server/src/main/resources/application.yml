spring:
  application:
    name: eventus-server

  datasource:
    url: jdbc:postgresql://localhost:5432/eventus
    username: eventus
    password: eventus
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: eventus-secret-key-change-in-production-min-256-bits-long-key-here
    expiration-ms: 86400000  # 24 hours
