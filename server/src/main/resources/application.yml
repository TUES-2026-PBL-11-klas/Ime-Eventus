spring:
  application:
    name: eventus-server

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventus}
    username: ${SPRING_DATASOURCE_USERNAME:eventus}
    password: ${SPRING_DATASOURCE_PASSWORD:eventus}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

# JWT Configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-production-min-256-bits-long-key-here}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
